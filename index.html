<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Exit Loop: Passage</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game" aria-label="地下通路を観察するゲーム">
    <header class="hud" aria-label="ゲーム状態">
      <div class="hud-item hud-primary">
        <span>進行度</span>
        <strong id="exitCount">0 / 8</strong>
      </div>
      <div class="hud-divider" aria-hidden="true"></div>
      <div class="hud-item">
        <span>発見数</span>
        <strong id="foundCount">発見 0 / 0</strong>
      </div>
      <div class="hud-item">
        <span>状態</span>
        <strong id="phaseLabel">待機</strong>
      </div>
      <div class="scan" aria-hidden="true">
        <span id="scanBar"></span>
      </div>
    </header>

    <section class="viewport" aria-label="地下通路">
      <canvas id="scene" width="1280" height="720" aria-label="地下通路の視界"></canvas>
      <div class="grain" aria-hidden="true"></div>

      <aside class="notice" id="notice">
        <h1>Exit Loop: Passage</h1>
        <p>異変があれば引き返す。なければ進む。通路だけをよく見てください。</p>
        <button id="startButton" type="button">開始</button>
      </aside>
    </section>

    <footer class="controls" aria-label="操作">
      <button id="backButton" class="control-button control-back" type="button" disabled>
        <span class="keycap">A</span>
        <span class="button-label">引き返す</span>
      </button>
      <button id="forwardButton" class="control-button control-forward" type="button" disabled>
        <span class="keycap">D</span>
        <span class="button-label">進む</span>
      </button>
    </footer>
  </main>

  <script src="game.js"></script>
</body>
</html>
